<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإمام</title>
    <style>
        :root { --primary: #12372A; --secondary: #436850; --danger: #d32f2f; }
        * { box-sizing: border-box; font-family: system-ui, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; color: var(--primary); padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 6px solid var(--primary); }
        h1 { font-size: 20px; text-align: center; margin-bottom: 20px; color: var(--primary); }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 12px; border: 1px solid #ced4da; font-size: 16px; margin: 15px 0; resize: none; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-voice { background: #ff6e40; color: white; }
        .recording { background: var(--danger) !important; animation: pulse 1.5s infinite; }
        .live-box { width: 100%; min-height: 60px; padding: 12px; background: #fff5f5; border: 1px solid #ffe3e5; border-radius: 8px; font-size: 16px; color: var(--danger); margin-top: 10px; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎙️ لوحة تحكم الإمام (المنبر)</h1>
        <div id="fb-status" style="text-align:center; font-size:13px; font-weight:bold; margin-bottom:15px;">جارٍ التحقق من الاتصال...</div>
        <p><strong>الخيار 1: اكتب النص العربي واضغط نشر:</strong></p>
        <textarea id="admin-input" placeholder="اكتب نص الخطبة هنا... مثلاً: اتقوا الله عباد الله"></textarea>
        <button class="btn-blue" onclick="publishText()">📢 نشر وتحديث النص عند المصلين</button>
        <hr style="border:0; border-top: 1px dashed #ccc; margin: 20px 0;">
        <p><strong>الخيار 2: التحدث المباشر الفوري (الذكاء الاصطناعي):</strong></p>
        <button id="voice-btn" class="btn-voice" onclick="toggleVoice()">🎙️ تشغيل الميكروفون والبث الفوري</button>
        <div id="live-arabic" class="live-box">الميكروفون مغلق حالياً...</div>
    </div>
    <script>
        /* ============================================================
           ⚙️ إعدادات Firebase — عدّل هذا الجزء فقط بربط مشروعك الخاص
           1) أنشئ مشروع Firebase من https://console.firebase.google.com
           2) فعّل Realtime Database
           3) انسخ رابط قاعدة البيانات (يشبه: https://xxxx-default-rtdb.firebaseio.com)
           4) الصقه هنا بدل الرابط الحالي (وهو رابط تجريبي غير آمن للاستخدام الفعلي)
           5) اجعل نفس القيم بالضبط (databaseURL و sermonPath) في ملف musalli.html
           ============================================================ */
        const FIREBASE_CONFIG = {
            databaseURL: "https://mosqa-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            // مسار مخصص وغير متوقَّع بدل "sermon" — يعمل كحماية بسيطة (وليست بديلاً كاملاً عن قواعد الأمان الحقيقية)
            sermonPath: "sermon"
        };
        const FIREBASE_DB_URL = `${FIREBASE_CONFIG.databaseURL}/${FIREBASE_CONFIG.sermonPath}.json`;

        let recognition; let isRecording = false; let lastTimestamp = 0;

        async function checkFirebaseConnection() {
            const statusEl = document.getElementById('fb-status');
            if (FIREBASE_CONFIG.databaseURL.includes('YOUR-PROJECT-ID')) {
                statusEl.textContent = '⚠️ لم تربط مشروع Firebase الخاص بك بعد — عدّل FIREBASE_CONFIG أعلى الكود';
                statusEl.style.color = '#d32f2f';
                return;
            }
            try {
                const res = await fetch(FIREBASE_DB_URL);
                if (res.ok) {
                    statusEl.textContent = '✅ متصل بقاعدة بيانات Firebase';
                    statusEl.style.color = '#2e7d32';
                } else {
                    statusEl.textContent = '⚠️ تعذّر الاتصال — تحقق من الرابط وقواعد الأمان في Firebase';
                    statusEl.style.color = '#d32f2f';
                }
            } catch (e) {
                statusEl.textContent = '⚠️ تعذّر الاتصال — تحقق من الرابط وقواعد الأمان في Firebase';
                statusEl.style.color = '#d32f2f';
            }
        }
        async function sendToCloud(text) {
            if(!text.trim()) return;
            try { await fetch(FIREBASE_DB_URL, { method: 'PUT', body: JSON.stringify({ text: text, timestamp: Date.now() }) }); } 
            catch (e) { console.error(e); }
        }
        function publishText() { const txt = document.getElementById('admin-input').value; if(!txt.trim()) return; sendToCloud(txt); }
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition(); recognition.continuous = true; recognition.interimResults = true; recognition.lang = 'ar-SA';
            recognition.onresult = function(event) {
                let interimTranscript = ''; let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }
                // نعرض النص الجزئي محليًا للإمام فقط كمرجع فوري، لكن لا نرسله لفايربيز
                document.getElementById('live-arabic').innerText = interimTranscript || finalTranscript || '...';
                // نرسل فقط الجملة المكتملة (isFinal) — هذا يمنع الوميض عند المصلي ويسمح بكشف الآيات/الأحاديث بدقة
                if (finalTranscript.trim()) {
                    sendToCloud(finalTranscript.trim());
                }
            };
            recognition.onerror = function(event) {
                const fatalErrors = ['not-allowed', 'audio-capture', 'service-not-allowed'];
                if (fatalErrors.includes(event.error)) {
                    stopRecording();
                    document.getElementById('fb-status').textContent = '⚠️ تعذّر الوصول للميكروفون: ' + event.error;
                    document.getElementById('fb-status').style.color = '#d32f2f';
                }
                // أخطاء عابرة وطبيعية زي no-speech (لحظة صمت) أو network تُترك لـ onend تعيد التشغيل تلقائيًا
                console.log('Speech recognition event:', event.error);
            };
            recognition.onend = function() {
                if (isRecording) {
                    // تأخير بسيط قبل إعادة التشغيل يمنع خطأ "already started" اللي بيحصل لو استارت اتنادت بسرعة جدًا بعد stop
                    setTimeout(() => {
                        if (!isRecording) return;
                        try { recognition.start(); }
                        catch (e) { setTimeout(() => { if (isRecording) { try { recognition.start(); } catch (e2) {} } }, 500); }
                    }, 250);
                }
            };
        }
        function toggleVoice() { if (isRecording) stopRecording(); else startRecording(); }
        function startRecording() { if(!recognition) return; recognition.start(); isRecording = true; document.getElementById('voice-btn').innerText = "🛑 الميكروفون يرسل البث الآن..."; document.getElementById('voice-btn').className = "btn-voice recording"; }
        function stopRecording() { if(!recognition) return; recognition.stop(); isRecording = false; document.getElementById('voice-btn').innerText = "🎙️ تشغيل الميكروفون والبث الفوري"; document.getElementById('voice-btn').className = "btn-voice"; }
        checkFirebaseConnection();
    </script>
</body>
</html>
